<style>
:root{
  --bg:linear-gradient(180deg,#e8f7ef,#f2fbff);
  --text:#2f3e34;
  --card:rgba(255,255,255,0.85);
  --accent:#78be96; /* glavna zelena */
}

body.dark{
  --bg:#0f1a17;
  --text:#e6f2ee;
  --card:#162420;
}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(120,190,150,0.85);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 30px;
}

.nav-logo{ font-size:22px; font-weight:bold; }

.toggle{
  cursor:pointer;
  padding:6px 12px;
  border-radius:20px;
  background:white;
}

.nav-links{
  list-style:none;
  display:flex;
  gap:20px;
  margin:0;
  padding:0;
}

.nav-links a{
  text-decoration:none;
  color:var(--text);
}

/* HEADER FULLSCREEN */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:#78be96;
}

header img{
  width:120px;
  margin-bottom:20px;
}

header h1{
  font-size:54px;
  color:white;
  margin-bottom:10px;
}

header p{
  font-size:20px;
  color:#eafff5;
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:auto;
  padding:70px 20px;
}

h2{ margin-bottom:30px; }

/* PROIZVOD SLIKE */
.proizvod-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.proizvod-grid img{
  width:100%;
  border-radius:16px;
}

/* AKTIVNOSTI */
.aktivnost{
  margin-bottom:30px;
  display:grid;
  grid-template-columns:320px 1fr;
  gap:30px;
  background:var(--card);
  padding:30px;
  border-radius:16px;
}

.no-image{
  height:220px;
  border-radius:12px;
  background:linear-gradient(135deg,#d4f3e8,#e6f4ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  opacity:0.6;
}

.slider{
  position:relative;
  width:100%;
  height:220px;
  overflow:hidden;
  border-radius:14px;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.slider img.active{ display:block; }
